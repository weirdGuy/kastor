# GoReleaser configuration for the kastor CLI.
# Releases are tag-driven: pushing a v* tag runs .github/workflows/release.yml,
# which runs the test suite and then `goreleaser release`.
version: 2

project_name: kastor

builds:
  - id: kastor
    main: ./cmd/kastor
    binary: kastor
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # windows/arm64 is not a supported target (KAS-40): five binaries total.
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    # cmd/kastor/root.go defines exactly two build-time variables:
    # main.version and main.commit.
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .ShortCommit }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^chore"
      - "^docs"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other changes
      order: 999

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  # Kastor is pre-1.0: set expectations at the top of every release note.
  header: |
    > [!NOTE]
    > Kastor is pre-1.0. The v0 language semantics may still change until the
    > v0 exit criteria ([KAS-36](https://linear.app/getkastor/issue/KAS-36)) are met.

# Homebrew cask in weirdGuy/homebrew-tap (`brew install weirdGuy/tap/kastor`).
# Casks are the current GoReleaser mechanism for taps (`brews` is deprecated)
# and are macOS-only; Linux users have scripts/install.sh or `go install`.
homebrew_casks:
  - name: kastor
    binaries:
      - kastor
    repository:
      owner: weirdGuy
      name: homebrew-tap
      # `index .Env` instead of .Env.X: plain field access errors on missing
      # env keys, and TAP_GITHUB_TOKEN may be unset (local runs, forks).
      # Only Go template builtins here — publish-stage templates like this one
      # are NOT evaluated by `goreleaser check` or the snapshot dry-run, so a
      # bad function name only surfaces during a real release (v0.1.0 failed
      # on the non-existent `envOrDefault`).
      token: '{{ if index .Env "TAP_GITHUB_TOKEN" }}{{ .Env.TAP_GITHUB_TOKEN }}{{ end }}'
    # No token → skip pushing the cask instead of failing the release.
    skip_upload: '{{ if index .Env "TAP_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    directory: Casks
    homepage: "https://github.com/weirdGuy/kastor"
    description: "Terraform for AI agents — declarative agent specs in HCL"
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    # Binaries are not signed/notarized (out of scope for v0), so clear the
    # quarantine attribute Gatekeeper would otherwise enforce.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kastor"]
          end
