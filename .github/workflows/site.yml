name: Site

on:
  push:
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
